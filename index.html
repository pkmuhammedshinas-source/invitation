<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: linear-gradient(135deg,#e8dfd6,#f5efe6);
      height: 100vh;
      overflow: hidden;
    }

    /* 🌫 GLASS */
    .glass {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    /* ADMIN */
    #admin {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .admin-box {
      padding: 30px;
      width: 280px;
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 8px;
      width: 100%;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .gold {
      background: linear-gradient(45deg,gold,#d4a017);
    }

    /* 🎬 INTRO */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
      z-index: 10;
    }

    #intro h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 40px;
    }

    /* INVITE */
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: scale(1.1);
      transition: 1.2s ease;
    }

    .card.show {
      opacity: 1;
      transform: scale(1);
    }

    .invite-box {
      padding: 40px 30px;
      width: 320px;
      text-align: center;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 40px;
      background: linear-gradient(90deg,#caa64b,gold,#caa64b);
      -webkit-background-clip: text;
      color: transparent;
      animation: shimmer 3s infinite linear;
    }

    @keyframes shimmer {
      0% { background-position: -200px; }
      100% { background-position: 200px; }
    }

    .desc { margin: 10px 0; }
    .date, .time { margin-top: 5px; }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }

    /* RSVP */
    #rsvp {
      display: none;
      position: absolute;
      width: 100%;
      height: 100%;
      justify-content: center;
      align-items: center;
    }

    .rsvp-box {
      padding: 30px;
      text-align: center;
    }

    /* MUSIC BUTTON */
    #musicBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 20;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
  <div class="admin-box glass">
    <h2>Create Invite</h2>

    <input id="groom" placeholder="Groom Name">
    <input id="bride" placeholder="Bride Name">
    <input id="date" type="date">
    <input id="time" type="time">
    <input id="desc" placeholder="Description">

    <button class="gold" onclick="generate()">Generate</button>

    <p id="link"></p>
  </div>
</div>

<!-- INTRO -->
<div id="intro" onclick="startInvite()">
  <h1>You're Invited</h1>
  <p>Tap to Open</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="musicBtn" onclick="toggleMusic()">🔊</div>

<!-- INVITE -->
<div class="card" id="invite">
  <div class="invite-box glass">
    <div class="names" id="names"></div>
    <div class="desc" id="descText"></div>
    <div class="date" id="dateText"></div>
    <div class="time" id="timeText"></div>

    <button class="yes" onclick="goRSVP()">I Will Attend</button>
    <button class="no">Can't Attend</button>
  </div>
</div>

<!-- RSVP -->
<div id="rsvp">
  <div class="rsvp-box glass">
    <h2>How many will attend?</h2>
    <input id="members" type="number">
    <button onclick="submitRSVP()">Submit</button>
    <div id="thanks">❤️ Thank You ❤️</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// GENERATE LINK
function generate() {
  const groom = document.getElementById("groom").value;
  const bride = document.getElementById("bride").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const desc = document.getElementById("desc").value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&date=" + encodeURIComponent(date) +
    "&time=" + encodeURIComponent(time) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
}

// LOAD INVITE
if (params.get("groom")) {
  document.getElementById("admin").style.display = "none";
  document.getElementById("intro").style.display = "flex";

  const groom = params.get("groom");
  const bride = params.get("bride");
  const date = params.get("date");
  const time = params.get("time");
  const desc = params.get("desc");

  const dt = new Date(date + "T" + time);

  document.getElementById("names").innerText = groom + " & " + bride;
  document.getElementById("descText").innerText = desc;

  document.getElementById("dateText").innerText =
    dt.toLocaleDateString("en-US", { day:"numeric", month:"long", year:"numeric" });

  document.getElementById("timeText").innerText =
    dt.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

// START INVITE
function startInvite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("invite").classList.add("show");
  document.getElementById("music").play();
}

// MUSIC
function toggleMusic() {
  const m = document.getElementById("music");
  if (m.paused) m.play();
  else m.pause();
}

// RSVP
function goRSVP() {
  document.getElementById("invite").style.display = "none";
  document.getElementById("rsvp").style.display = "flex";

  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });
  document.getElementById("thanks").style.display = "block";
}
</script>

</body>
</html>
