<!DOCTYPE html>
<html>
<head>
  <title>Luxury Wedding Invite</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg,#f5efe6,#e8dfd6);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 380px;
      padding: 50px 30px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;

      animation: fadeIn 1s ease;
    }

    /* Elegant corner lines (NO IMAGES) */
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 60px;
      height: 60px;
      border: 1.5px solid rgba(180,150,80,0.6);
    }

    .card::before {
      top: 15px;
      left: 15px;
      border-right: none;
      border-bottom: none;
    }

    .card::after {
      bottom: 15px;
      right: 15px;
      border-left: none;
      border-top: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none; }

    .title {
      font-size: 11px;
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 10px;
    }

    .names {
      font-size: 28px;
      margin: 20px 0;
      font-style: italic;
      color: #2e2e2e;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(to right, transparent, gold, transparent);
      margin: 15px auto;
    }

    .desc {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .date {
      font-size: 14px;
      margin-bottom: 10px;
      color: #444;
    }

    #countdown {
      margin: 10px 0;
      font-weight: bold;
      color: #6b5b3e;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 80%;
      background: #f2f2f2;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      margin: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }
    .gold { background: linear-gradient(45deg,gold,#d4a017); color: black; }

    #thanks {
      margin-top: 20px;
      font-size: 20px;
      animation: fadeIn 1s ease;
      color: #444;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div class="card" id="admin">
  <h3>Create Invite</h3>

  <input id="groom" placeholder="Groom Name">
  <input id="bride" placeholder="Bride Name">
  <input id="datetime" placeholder="2026-04-20T18:00">
  <input id="desc" placeholder="Family Description">

  <button class="gold" onclick="generate()">Generate</button>

  <p id="link"></p>
  <canvas id="qr"></canvas>
</div>

<!-- INVITE -->
<div class="card hidden" id="invite">
  <div class="title">TOGETHER WITH THEIR FAMILIES</div>

  <div class="names" id="names"></div>

  <div class="divider"></div>

  <div class="desc" id="descText"></div>

  <div class="date" id="dateText"></div>

  <div id="countdown"></div>

  <button class="yes" onclick="goRSVP()">I Will Attend</button>
  <button class="no">Unfortunately I Can't</button>
</div>

<!-- RSVP -->
<div class="card hidden" id="rsvp">
  <h3>How many will attend?</h3>

  <input id="members" type="number" placeholder="Members">

  <button class="gold" onclick="submitRSVP()">Submit</button>

  <div id="thanks" class="hidden">❤️ Thank You! See You There ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// GENERATE LINK
function generate() {
  const groom = document.getElementById("groom").value;
  const bride = document.getElementById("bride").value;
  const datetime = document.getElementById("datetime").value;
  const desc = document.getElementById("desc").value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&datetime=" + encodeURIComponent(datetime) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
  QRCode.toCanvas(document.getElementById("qr"), link);
}

// LOAD INVITE
if (params.get("groom")) {
  document.getElementById("admin").classList.add("hidden");
  document.getElementById("invite").classList.remove("hidden");

  const groom = params.get("groom");
  const bride = params.get("bride");
  const datetime = new Date(params.get("datetime"));
  const desc = params.get("desc");

  document.getElementById("names").innerText = groom + " & " + bride;
  document.getElementById("descText").innerText = desc;
  document.getElementById("dateText").innerText = datetime.toLocaleString();

  setInterval(() => {
    const now = new Date();
    const diff = datetime - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerText =
      `${d} Days ${h} Hours ${m} Minutes`;
  }, 1000);
}

// RSVP
function goRSVP() {
  document.getElementById("invite").classList.add("hidden");
  document.getElementById("rsvp").classList.remove("hidden");

  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });

  setTimeout(() => {
    document.getElementById("thanks").classList.remove("hidden");
  }, 300);
}
</script>

</body>
</html>
