<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #e9e4db;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* ADMIN */
    #admin {
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 6px;
      width: 200px;
    }

    button {
      padding: 10px 16px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    .gold { background: gold; }

    /* INTRO */
    #intro {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
      z-index: 10;
    }

    #intro h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 40px;
    }

    /* CARD */
    #invite {
      display: none;
    }

    .card {
      width: 340px;
      padding: 50px 30px;
      background: #fffdf9;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid #d6c7a1;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #d4b26a;
      margin: 20px auto;
    }

    .date, .time {
      margin-top: 10px;
    }

    #countdown {
      margin-top: 15px;
      font-size: 13px;
      color: #8a7f6f;
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }

    /* RSVP */
    #rsvp {
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
  <h2>Create Invite</h2>

  <input id="groom" placeholder="Groom Name"><br>
  <input id="bride" placeholder="Bride Name"><br>
  <input id="date" type="date"><br>
  <input id="time" type="time"><br>
  <input id="desc" placeholder="Description"><br>

  <button class="gold" onclick="generate()">Generate</button>
  <p id="link"></p>
</div>

<!-- INTRO -->
<div id="intro" onclick="startInvite()">
  <h1>You're Invited</h1>
  <p>Tap to Open</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- INVITE -->
<div id="invite">
  <div class="card">

    <div class="names" id="names"></div>

    <div class="divider"></div>

    <div id="descText"></div>

    <div class="date" id="dateText"></div>
    <div class="time" id="timeText"></div>

    <div id="countdown"></div>

    <button class="yes" onclick="goRSVP()">I Will Attend</button>
    <button class="no">Can't Attend</button>

  </div>
</div>

<!-- RSVP -->
<div id="rsvp">
  <h2>How many will attend?</h2>
  <input id="members" type="number"><br>
  <button onclick="submitRSVP()">Submit</button>
  <div id="thanks">❤️ Thank You ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let eventDate = null;

// GENERATE LINK
function generate() {
  const groom = document.getElementById("groom").value;
  const bride = document.getElementById("bride").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const desc = document.getElementById("desc").value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&date=" + encodeURIComponent(date) +
    "&time=" + encodeURIComponent(time) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
}

// LOAD DATA
if (params.get("groom")) {
  document.getElementById("admin").style.display = "none";
  document.getElementById("intro").style.display = "flex";

  const groom = params.get("groom");
  const bride = params.get("bride");
  const date = params.get("date");
  const time = params.get("time");

  eventDate = new Date(date + "T" + time);

  document.getElementById("names").innerText = groom + " & " + bride;
  document.getElementById("descText").innerText = params.get("desc");

  document.getElementById("dateText").innerText =
    eventDate.toDateString();

  document.getElementById("timeText").innerText =
    eventDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  startCountdown();
}

// START INVITE
function startInvite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("invite").style.display = "block";

  const music = document.getElementById("music");
  music.play().catch(() => {});
}

// COUNTDOWN
function startCountdown() {
  if (!eventDate) return;

  setInterval(() => {
    const now = new Date();
    const diff = eventDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerText = "Today is the day 🎉";
      return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerText =
      `${d} Days ${h} Hours ${m} Minutes`;
  }, 1000);
}

// RSVP
function goRSVP() {
  document.getElementById("invite").style.display = "none";
  document.getElementById("rsvp").style.display = "block";

  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });
  document.getElementById("thanks").style.display = "block";
}
</script>

</body>
</html>
