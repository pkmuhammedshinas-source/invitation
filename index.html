<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #e9e4db;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ADMIN */
    #admin {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .admin-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 8px;
      width: 200px;
    }

    button {
      padding: 10px 16px;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    .gold {
      background: gold;
    }

    /* INTRO */
    #intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
      z-index: 10;
    }

    #intro h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 40px;
    }

    /* REAL CARD */
    .card {
      width: 360px;
      padding: 50px 30px;
      background: #fffdf9;
      border-radius: 6px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
      position: relative;

      opacity: 0;
      transform: scale(0.95);
      transition: 1s ease;
    }

    .card.show {
      opacity: 1;
      transform: scale(1);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid #d6c7a1;
    }

    .title {
      font-size: 11px;
      letter-spacing: 3px;
      color: #8a7f6f;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      margin: 10px 0;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #d4b26a;
      margin: 20px auto;
    }

    .desc {
      font-size: 14px;
      color: #6a6258;
    }

    .date {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 600;
    }

    .time {
      font-size: 14px;
      margin-top: 5px;
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }

    /* RSVP */
    #rsvp {
      display: none;
      position: absolute;
      width: 100%;
      height: 100%;
      background: #e9e4db;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #thanks {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
  <div class="admin-box">
    <h2>Create Invite</h2>

    <input id="groom" placeholder="Groom Name"><br>
    <input id="bride" placeholder="Bride Name"><br>
    <input id="date" type="date"><br>
    <input id="time" type="time"><br>
    <input id="desc" placeholder="Description"><br>

    <button class="gold" onclick="generate()">Generate</button>

    <p id="link"></p>
  </div>
</div>

<!-- INTRO -->
<div id="intro" onclick="startInvite()">
  <h1>You're Invited</h1>
  <p>Tap to Open</p>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- INVITE -->
<div class="card" id="invite">

  <div class="title">TOGETHER WITH THEIR FAMILIES</div>

  <div class="names" id="names"></div>

  <div class="divider"></div>

  <div class="desc" id="descText"></div>

  <div class="date" id="dateText"></div>
  <div class="time" id="timeText"></div>

  <button class="yes" onclick="goRSVP()">I Will Attend</button>
  <button class="no">Can't Attend</button>

</div>

<!-- RSVP -->
<div id="rsvp">
  <h2>How many will attend?</h2>
  <input id="members" type="number">
  <button onclick="submitRSVP()">Submit</button>
  <div id="thanks">❤️ Thank You ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// GENERATE
function generate() {
  const groom = document.getElementById("groom").value;
  const bride = document.getElementById("bride").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const desc = document.getElementById("desc").value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&date=" + encodeURIComponent(date) +
    "&time=" + encodeURIComponent(time) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
}

// LOAD
if (params.get("groom")) {
  document.getElementById("admin").style.display = "none";
  document.getElementById("intro").style.display = "flex";

  const dt = new Date(params.get("date") + "T" + params.get("time"));

  document.getElementById("names").innerText =
    params.get("groom") + " & " + params.get("bride");

  document.getElementById("descText").innerText = params.get("desc");

  document.getElementById("dateText").innerText =
    dt.toLocaleDateString("en-US", { day:"numeric", month:"long", year:"numeric" });

  document.getElementById("timeText").innerText =
    dt.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

// START
function startInvite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("invite").classList.add("show");
  document.getElementById("music").play();
}

// RSVP
function goRSVP() {
  document.getElementById("invite").style.display = "none";
  document.getElementById("rsvp").style.display = "flex";

  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });
}
</script>

</body>
</html>
