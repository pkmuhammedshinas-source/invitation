<!DOCTYPE html>
<html>
<head>
  <title>Luxury Wedding Invite</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #e6dfd5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 380px;
      padding: 50px 25px;
      background: #fffdf9;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
      animation: fadeIn 1s ease;
    }

    /* 🌸 Floral Decorations */
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 150px;
      height: 150px;
      background: url('https://i.imgur.com/8Km9tLL.png') no-repeat;
      background-size: contain;
    }

    .card::after {
      content: "";
      position: absolute;
      bottom: 0;
      right: 0;
      width: 150px;
      height: 150px;
      background: url('https://i.imgur.com/8Km9tLL.png') no-repeat;
      transform: rotate(180deg);
      background-size: contain;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .hidden { display: none; }

    .title {
      font-size: 12px;
      letter-spacing: 2px;
      color: #777;
    }

    .names {
      font-size: 26px;
      margin: 20px 0;
      font-style: italic;
      color: #333;
    }

    .desc {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .date {
      font-size: 14px;
      margin-bottom: 15px;
    }

    #countdown {
      margin: 15px 0;
      font-weight: bold;
      color: #444;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 80%;
      background: #f3f3f3;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      margin: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .yes { background: #3c8d40; color: white; }
    .no { background: #c94c4c; color: white; }
    .gold { background: linear-gradient(45deg,gold,orange); }

    #thanks {
      margin-top: 20px;
      font-size: 20px;
      animation: fadeIn 1s ease;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div class="card" id="admin">
  <h3>Create Invite</h3>
  <input id="groom" placeholder="Groom Name">
  <input id="bride" placeholder="Bride Name">
  <input id="datetime" placeholder="2026-04-20T18:00">
  <input id="desc" placeholder="Family Description">

  <button class="gold" onclick="generate()">Generate</button>
  <p id="link"></p>
  <canvas id="qr"></canvas>
</div>

<!-- INVITE -->
<div class="card hidden" id="invite">
  <div class="title">TOGETHER WITH THEIR FAMILIES</div>

  <div class="names" id="names"></div>

  <div class="desc" id="descText"></div>

  <div class="date" id="dateText"></div>

  <div id="countdown"></div>

  <button class="yes" onclick="goRSVP()">I Will Attend</button>
  <button class="no">Unfortunately I Can't</button>
</div>

<!-- RSVP -->
<div class="card hidden" id="rsvp">
  <h3>How many will attend?</h3>
  <input id="members" type="number" placeholder="Members">
  <button class="gold" onclick="submitRSVP()">Submit</button>
  <div id="thanks" class="hidden">❤️ Thank You! See You There ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// GENERATE
function generate() {
  const groom = document.getElementById("groom").value;
  const bride = document.getElementById("bride").value;
  const datetime = document.getElementById("datetime").value;
  const desc = document.getElementById("desc").value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&datetime=" + encodeURIComponent(datetime) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
  QRCode.toCanvas(document.getElementById("qr"), link);
}

// LOAD INVITE
if (params.get("groom")) {
  admin.classList.add("hidden");
  invite.classList.remove("hidden");

  const groom = params.get("groom");
  const bride = params.get("bride");
  const datetime = new Date(params.get("datetime"));
  const desc = params.get("desc");

  names.innerText = groom + " & " + bride;
  descText.innerText = desc;
  dateText.innerText = datetime.toLocaleString();

  setInterval(() => {
    const now = new Date();
    const diff = datetime - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    countdown.innerText = `${d} Days ${h} Hours ${m} Minutes`;
  }, 1000);
}

// RSVP
function goRSVP() {
  invite.classList.add("hidden");
  rsvp.classList.remove("hidden");

  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });

  setTimeout(() => {
    thanks.classList.remove("hidden");
  }, 300);
}
</script>

</body>
</html>
