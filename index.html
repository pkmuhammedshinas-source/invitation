<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #e9e4db;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* HIDE ALL BY DEFAULT */
    #admin, #intro, #invite, #rsvp {
      display: none;
    }

    /* ADMIN */
    #admin {
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 6px;
      width: 200px;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .gold { background: gold; }

    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      cursor: pointer;
    }

    #intro h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 40px;
    }

    /* CARD */
    .card {
      width: 340px;
      padding: 50px 30px;
      background: #fffdf9;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid #d6c7a1;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #d4b26a;
      margin: 20px auto;
    }

    #countdown {
      margin-top: 15px;
      font-size: 13px;
      color: #8a7f6f;
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }

    #rsvp {
      text-align: center;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
  <h2>Create Invite</h2>

  <input id="groom" placeholder="Groom Name"><br>
  <input id="bride" placeholder="Bride Name"><br>
  <input id="date" type="date"><br>
  <input id="time" type="time"><br>
  <input id="desc" placeholder="Description"><br>

  <button class="gold" onclick="generate()">Generate</button>
  <p id="link"></p>
</div>

<!-- INTRO -->
<div id="intro" onclick="startInvite()">
  <h1>You're Invited</h1>
  <p>Tap to Open</p>
</div>

<!-- INVITE -->
<div id="invite">
  <div class="card">

    <div class="names" id="names"></div>
    <div class="divider"></div>

    <div id="descText"></div>

    <div id="dateText"></div>
    <div id="timeText"></div>

    <div id="countdown"></div>

    <button class="yes" onclick="goRSVP()">I Will Attend</button>
    <button class="no">Can't Attend</button>

  </div>
</div>

<!-- RSVP -->
<div id="rsvp">
  <h2>How many will attend?</h2>
  <input id="members" type="number"><br>
  <button onclick="submitRSVP()">Submit</button>
  <div id="thanks">❤️ Thank You ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let eventDate = null;

// 👉 CONTROL VISIBILITY
if (!params.get("groom")) {
  // ADMIN MODE
  document.getElementById("admin").style.display = "block";
} else {
  // INVITE MODE
  document.getElementById("intro").style.display = "flex";

  const groom = params.get("groom");
  const bride = params.get("bride");
  const date = params.get("date");
  const time = params.get("time");

  eventDate = new Date(date + "T" + time);

  document.getElementById("names").innerText = groom + " & " + bride;
  document.getElementById("descText").innerText = params.get("desc");

  document.getElementById("dateText").innerText =
    eventDate.toDateString();

  document.getElementById("timeText").innerText =
    eventDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  startCountdown();
}

// GENERATE LINK
function generate() {
  const link = window.location.origin + window.location.pathname +
    "?groom=" + groom.value +
    "&bride=" + bride.value +
    "&date=" + date.value +
    "&time=" + time.value +
    "&desc=" + desc.value;

  document.getElementById("link").innerText = link;
}

// START INVITE
function startInvite() {
  intro.style.display = "none";
  invite.style.display = "block";
}

// COUNTDOWN
function startCountdown() {
  setInterval(() => {
    const diff = eventDate - new Date();

    if (diff <= 0) {
      countdown.innerText = "Today 🎉";
      return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);

    countdown.innerText = `${d}D ${h}H ${m}M`;
  },1000);
}

// RSVP
function goRSVP() {
  invite.style.display = "none";
  rsvp.style.display = "block";
  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });
  thanks.style.display = "block";
}
</script>

</body>
</html>
