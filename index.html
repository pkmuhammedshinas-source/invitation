<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f4efe8;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Playfair Display', serif;
    }

    .card {
      position: relative;
      width: 420px;
      max-width: 90%;
      text-align: center;
    }

    /* PNG FRAME */
    .frame {
      width: 100%;
      display: block;
    }

    /* TEXT INSIDE FRAME */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65%;
    }

    .top-text {
      font-size: 11px;
      letter-spacing: 2px;
      color: #8a7f6f;
      margin-bottom: 10px;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      line-height: 1.2;
      color: #2d2d2d;
      margin: 10px 0;
    }

    .desc {
      font-size: 13px;
      color: #6a6258;
      margin: 10px 0;
      line-height: 1.5;
    }

    .date {
      margin-top: 15px;
      font-size: 16px;
      font-weight: 600;
      color: #3e3e3e;
    }

    .time {
      font-size: 14px;
      margin-top: 5px;
      color: #6b5b3e;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: #d4b26a;
      margin: 15px auto;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      padding: 8px 14px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .yes {
      background: #4CAF50;
      color: white;
    }

    .no {
      background: #c94c4c;
      color: white;
    }

    /* RSVP */
    .hidden { display: none; }

    .rsvp {
      text-align: center;
    }

    .rsvp input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    .thanks {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div id="admin" class="rsvp">
  <h3>Create Invite</h3>

  <input id="groom" placeholder="Groom Name"><br>
  <input id="bride" placeholder="Bride Name"><br>
  <input id="date" type="date"><br>
  <input id="time" type="time"><br>
  <input id="desc" placeholder="Family Description"><br>

  <button onclick="generate()">Generate Link</button>

  <p id="link"></p>
</div>

<!-- INVITE -->
<div id="invite" class="card hidden">

  <img src="frame.png" class="frame">

  <div class="content">
    <div class="top-text">TOGETHER WITH THEIR FAMILIES</div>

    <div class="names" id="names"></div>

    <div class="divider"></div>

    <div class="desc" id="descText"></div>

    <div class="date" id="dateText"></div>
    <div class="time" id="timeText"></div>

    <div class="buttons">
      <button class="yes" onclick="goRSVP()">I Will Attend</button>
      <button class="no">Can't Attend</button>
    </div>
  </div>

</div>

<!-- RSVP -->
<div id="rsvp" class="rsvp hidden">
  <h3>How many will attend?</h3>
  <input id="members" type="number"><br>
  <button onclick="submitRSVP()">Submit</button>

  <div id="thanks" class="thanks hidden">
    ❤️ Thank You ❤️
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// GENERATE
function generate() {
  const groom = groomInput.value;
  const bride = brideInput.value;
  const date = dateInput.value;
  const time = timeInput.value;
  const desc = descInput.value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&date=" + encodeURIComponent(date) +
    "&time=" + encodeURIComponent(time) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
}

// LOAD INVITE
if (params.get("groom")) {
  document.getElementById("admin").classList.add("hidden");
  document.getElementById("invite").classList.remove("hidden");

  const groom = params.get("groom");
  const bride = params.get("bride");
  const date = params.get("date");
  const time = params.get("time");
  const desc = params.get("desc");

  const dt = new Date(date + "T" + time);

  document.getElementById("names").innerText = groom + " & " + bride;
  document.getElementById("descText").innerText = desc;

  document.getElementById("dateText").innerText =
    dt.toLocaleDateString("en-US", { day:"numeric", month:"long", year:"numeric" });

  document.getElementById("timeText").innerText =
    dt.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });
}

// RSVP
function goRSVP() {
  invite.classList.add("hidden");
  rsvp.classList.remove("hidden");
}

function submitRSVP() {
  thanks.classList.remove("hidden");
}
</script>

</body>
</html>
