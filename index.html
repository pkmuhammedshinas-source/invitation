<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invitation</title>

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #e9e4db;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .hidden { display: none; }

    /* ADMIN */
    #admin {
      text-align: center;
    }

    input {
      padding: 10px;
      margin: 6px;
      width: 200px;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .gold { background: gold; }

    /* ENVELOPE */
    #envelope {
      width: 300px;
      height: 200px;
      position: relative;
      cursor: pointer;
    }

    .body {
      width: 100%;
      height: 100%;
      background: #f5efe6;
      border: 2px solid #d6c7a1;
      position: absolute;
      z-index: 1;
    }

    .flap {
      width: 100%;
      height: 100%;
      background: #e8dfd6;
      position: absolute;
      top: 0;
      transform-origin: top;
      transition: 0.8s;
      z-index: 2;
    }

    .open .flap {
      transform: rotateX(180deg);
    }

    /* CARD */
    #invite {
      opacity: 0;
      transform: scale(0.9);
      transition: 0.8s ease;
    }

    #invite.show {
      opacity: 1;
      transform: scale(1);
    }

    .card {
      width: 340px;
      padding: 50px 30px;
      background: #fffdf9;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid #d6c7a1;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: #d4b26a;
      margin: 20px auto;
    }

    #countdown {
      margin-top: 15px;
      font-size: 13px;
      color: #8a7f6f;
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }

    /* RSVP */
    #rsvp {
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div id="admin">
  <h2>Create Invite</h2>

  <input id="groom" placeholder="Groom Name"><br>
  <input id="bride" placeholder="Bride Name"><br>
  <input id="date" type="date"><br>
  <input id="time" type="time"><br>
  <input id="desc" placeholder="Description"><br>

  <button class="gold" onclick="generate()">Generate</button>
  <p id="link"></p>
</div>

<!-- ENVELOPE -->
<div id="envelope" class="hidden">
  <div class="body"></div>
  <div class="flap"></div>
</div>

<!-- INVITE -->
<div id="invite" class="hidden">
  <div class="card">

    <div class="names" id="names"></div>
    <div class="divider"></div>

    <div id="descText"></div>

    <div id="dateText"></div>
    <div id="timeText"></div>

    <div id="countdown"></div>

    <button class="yes" onclick="goRSVP()">I Will Attend</button>
    <button class="no">Can't Attend</button>

  </div>
</div>

<!-- RSVP -->
<div id="rsvp">
  <h2>How many will attend?</h2>
  <input id="members" type="number"><br>
  <button onclick="submitRSVP()">Submit</button>
  <div id="thanks">❤️ Thank You ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
let eventDate;

// ADMIN / INVITE SWITCH
if (!params.get("groom")) {
  admin.style.display = "block";
} else {
  admin.style.display = "none";
  envelope.classList.remove("hidden");

  const dt = new Date(params.get("date") + "T" + params.get("time"));
  eventDate = dt;

  names.innerText = params.get("groom") + " & " + params.get("bride");
  descText.innerText = params.get("desc");

  dateText.innerText = dt.toDateString();
  timeText.innerText = dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  startCountdown();
}

// GENERATE
function generate() {
  const link = window.location.origin + window.location.pathname +
    "?groom=" + groom.value +
    "&bride=" + bride.value +
    "&date=" + date.value +
    "&time=" + time.value +
    "&desc=" + desc.value;

  link.innerText = link;
}

// ENVELOPE CLICK
document.getElementById("envelope").addEventListener("click", function() {
  this.classList.add("open");

  setTimeout(() => {
    this.style.display = "none";
    invite.classList.remove("hidden");
    invite.classList.add("show");
  }, 800);
});

// COUNTDOWN
function startCountdown() {
  setInterval(() => {
    const diff = eventDate - new Date();

    if (diff <= 0) {
      countdown.innerText = "Today 🎉";
      return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);

    countdown.innerText = `${d} Days ${h} Hours ${m} Minutes`;
  },1000);
}

// RSVP
function goRSVP() {
  invite.style.display = "none";
  rsvp.style.display = "block";
  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });
  thanks.style.display = "block";
}
</script>

</body>
</html>
