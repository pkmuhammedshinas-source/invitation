<!DOCTYPE html>
<html>
<head>
  <title>Wedding Invite</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5efe6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Playfair Display', serif;
    }

    .container {
      position: relative;
      width: 400px;
      text-align: center;
    }

    /* 🌸 YOUR PNG FRAME */
    .frame {
      width: 100%;
    }

    /* TEXT OVERLAY */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
    }

    .title {
      font-size: 11px;
      letter-spacing: 2px;
      color: #777;
    }

    /* ✨ BIG NAMES */
    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 38px;
      margin: 15px 0;
      color: #2e2e2e;
    }

    .desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
    }

    .date {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 13px;
      color: #6b5b3e;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-size: 12px;
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #c94c4c; color: white; }

    .hidden { display: none; }
  </style>
</head>

<body>

<!-- ADMIN -->
<div class="container" id="admin">
  <input id="groom" placeholder="Groom Name"><br>
  <input id="bride" placeholder="Bride Name"><br>
  <input id="date" type="date"><br>
  <input id="time" type="time"><br>
  <input id="desc" placeholder="Family Description"><br>

  <button onclick="generate()">Generate</button>

  <p id="link"></p>
  <canvas id="qr"></canvas>
</div>

<!-- INVITE -->
<div class="container hidden" id="invite">
  <img src="frame.png" class="frame">

  <div class="content">
    <div class="title">TOGETHER WITH THEIR FAMILIES</div>

    <div class="names" id="names"></div>

    <div class="desc" id="descText"></div>

    <div class="date" id="dateText"></div>

    <div id="countdown"></div>

    <button class="yes" onclick="goRSVP()">I Will Attend</button>
    <button class="no">Can't Attend</button>
  </div>
</div>

<!-- RSVP -->
<div class="container hidden" id="rsvp">
  <h3>How many will attend?</h3>
  <input id="members" type="number"><br>
  <button onclick="submitRSVP()">Submit</button>
  <div id="thanks" class="hidden">❤️ Thank You ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// GENERATE
function generate() {
  const groom = document.getElementById("groom").value;
  const bride = document.getElementById("bride").value;
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const desc = document.getElementById("desc").value;

  const link = window.location.origin + window.location.pathname +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&date=" + encodeURIComponent(date) +
    "&time=" + encodeURIComponent(time) +
    "&desc=" + encodeURIComponent(desc);

  document.getElementById("link").innerText = link;
  QRCode.toCanvas(document.getElementById("qr"), link);
}

// LOAD INVITE
if (params.get("groom")) {
  admin.classList.add("hidden");
  invite.classList.remove("hidden");

  const groom = params.get("groom");
  const bride = params.get("bride");
  const date = params.get("date");
  const time = params.get("time");
  const desc = params.get("desc");

  const dt = new Date(date + "T" + time);

  names.innerText = groom + " & " + bride;
  descText.innerText = desc;

  dateText.innerText =
    dt.toLocaleDateString("en-US", { day:"numeric", month:"long", year:"numeric" }) +
    " at " +
    dt.toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" });

  setInterval(() => {
    const now = new Date();
    const diff = dt - now;

    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);

    countdown.innerText = `${d}D ${h}H ${m}M`;
  },1000);
}

// RSVP
function goRSVP() {
  invite.classList.add("hidden");
  rsvp.classList.remove("hidden");

  confetti({ particleCount: 200, spread: 120 });
}

function submitRSVP() {
  confetti({ particleCount: 300, spread: 150 });
  thanks.classList.remove("hidden");
}
</script>

</body>
</html>
