<!DOCTYPE html>
<html>
<head>
  <title>Luxury Wedding Invite</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg,#e8e1d9,#d6ccc2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* FLOATING PARTICLES */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveBg 20s linear infinite;
    }

    @keyframes moveBg {
      from { transform: translate(0,0); }
      to { transform: translate(-200px,-200px); }
    }

    .card {
      width: 360px;
      padding: 35px 20px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      position: relative;

      opacity: 0;
      transform: scale(0.9);
      animation: enter 0.8s ease forwards;
    }

    @keyframes enter {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .hidden { display: none; }

    .names {
      font-size: 26px;
      margin: 15px 0;
      font-style: italic;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
      width: 80%;
      background: #f3f3f3;
    }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      margin: 8px;
      cursor: pointer;
      font-weight: bold;
      position: relative;
      overflow: hidden;
    }

    button:after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      transition: 0.5s;
    }

    button:active:after {
      width: 200px;
      height: 200px;
    }

    .yes { background: #4CAF50; color: white; }
    .no { background: #d9534f; color: white; }
    .gold { background: linear-gradient(45deg,gold,orange); }

    #countdown {
      margin: 15px 0;
      font-weight: bold;
      font-size: 18px;
    }

    #thanks {
      font-size: 22px;
      margin-top: 20px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<!-- ADMIN -->
<div class="card" id="admin">
  <h2>Create Invite</h2>
  <input id="groom" placeholder="Groom Name">
  <input id="bride" placeholder="Bride Name">
  <input id="datetime" placeholder="2026-04-20T18:00">
  <input id="desc" placeholder="Family Description">

  <button class="gold" onclick="generate()">Generate</button>

  <p id="link"></p>
  <canvas id="qr"></canvas>
</div>

<!-- INVITE -->
<div class="card hidden" id="invite">
  <p>TOGETHER WITH THEIR FAMILIES</p>
  <div class="names" id="names"></div>
  <p id="descText"></p>
  <p id="dateText"></p>
  <div id="countdown"></div>

  <button class="yes" onclick="goRSVP()">I Will Attend</button>
  <button class="no">Unfortunately I Can't</button>
</div>

<!-- RSVP -->
<div class="card hidden" id="rsvp">
  <h3>How many will attend?</h3>
  <input id="members" type="number" placeholder="Members">
  <button class="gold" onclick="submitRSVP()">Submit</button>
  <div id="thanks" class="hidden">❤️ Thank You! See You There ❤️</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);

// ADMIN GENERATE
function generate() {
  const groom = groom.value;
  const bride = bride.value;
  const datetime = datetime.value;
  const desc = desc.value;

  const link = window.location.href.split("?")[0] +
    "?groom=" + encodeURIComponent(groom) +
    "&bride=" + encodeURIComponent(bride) +
    "&datetime=" + encodeURIComponent(datetime) +
    "&desc=" + encodeURIComponent(desc);

  linkOutput.innerText = link;
  QRCode.toCanvas(document.getElementById("qr"), link);
}

// LOAD INVITE
if (params.get("groom")) {
  admin.classList.add("hidden");
  invite.classList.remove("hidden");

  const groom = params.get("groom");
  const bride = params.get("bride");
  const datetime = new Date(params.get("datetime"));
  const desc = params.get("desc");

  names.innerText = groom + " & " + bride;
  descText.innerText = desc;
  dateText.innerText = datetime.toLocaleString();

  setInterval(() => {
    const now = new Date();
    const diff = datetime - now;

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    countdown.innerText = `${d} Days ${h} Hours ${m} Minutes`;
  }, 1000);
}

// TRANSITION TO RSVP
function goRSVP() {
  invite.style.opacity = "0";
  setTimeout(() => {
    invite.classList.add("hidden");
    rsvp.classList.remove("hidden");

    confetti({ particleCount: 200, spread: 120 });
  }, 400);
}

// FINAL SUBMIT
function submitRSVP() {
  confetti({ particleCount: 300, spread: 150, origin: { y: 0.6 } });

  setTimeout(() => {
    thanks.classList.remove("hidden");
  }, 300);
}
</script>

</body>
</html>
